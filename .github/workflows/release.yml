name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BIN_NAME: gg

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install --yes pkg-config libdbus-1-dev

      - name: Run tests
        run: cargo test --locked

  build:
    name: Build ${{ matrix.name }}
    needs: verify
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            runner: macos-14
            archive_name: gg-darwin-arm64
          - name: macOS x86_64
            runner: macos-13
            archive_name: gg-darwin-x86_64
          - name: Linux arm64
            runner: ubuntu-24.04-arm
            archive_name: gg-linux-arm64
          - name: Linux x86_64
            runner: ubuntu-24.04
            archive_name: gg-linux-x86_64

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes pkg-config libdbus-1-dev

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package release archive
        run: |
          mkdir -p dist
          cp "target/release/${BIN_NAME}" "${BIN_NAME}"
          tar -czf "dist/${{ matrix.archive_name }}.tar.gz" "${BIN_NAME}"
          rm -f "${BIN_NAME}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: dist/${{ matrix.archive_name }}.tar.gz
          if-no-files-found: error

  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: gg-*
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/*.tar.gz --clobber
          else
            gh release create "${TAG}" dist/*.tar.gz --verify-tag --generate-notes
          fi
